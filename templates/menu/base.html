            "tertiary-fixed-dim": "#c9c6c2",
            "secondary-fixed-dim": "#f0bd8b",
            "inverse-on-surface": "#f8efea",
            "surface-container-high": "#efe6e2",
            "error": "#ba1a1a",

            "surface-container": "#f5ece7",
            "outline-variant": "#c3c8c1",
            "error-container": "#ffdad6",

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      background-color: #fff8f5;
    }

    .menu-item-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 768px) {
      .menu-item-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .menu-item-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body class="font-body-md text-body-md overflow-x-hidden">
  <!-- TopNavBar -->
  <header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-md">
    <nav class="max-w-[1200px] mx-auto px-margin-mobile md:px-margin-desktop flex justify-between items-center h-20">
      <div class="flex items-center gap-3">
        <img alt="Botanical Heritage Logo" class="w-10 h-10 rounded-lg object-contain"
          src="https://lh3.googleusercontent.com/aida/ADBb0uh7py0ANLgWZ0cXFfO7G2dGC43yRvR-RcKbbJE9p1kk6p2KGTKHNWvIKIsFeDsTr38Moc6YOscK4zdSKfKUU4n69hMQyczeytLeM7OUdIzwinfRxsBne0lLgi5hzl7N5-Lg7DmdFcJ3R_PX-ErZ03qpGNC-YcIiE4AtZuAR0vGnrEnPZp7ubcXox24Mjr7_7iuTP0mkxQsg_65uTUEDwLrnJQwtayakS9jaB0Eim0Z0lDViu9ssbjRdJR6r" />
        <span class="font-display-lg text-headline-md text-primary tracking-tight">Botanical Heritage</span>
      </div>
      <div class="hidden md:flex items-center gap-stack-lg">
        <a class="font-body-md text-body-md text-primary font-bold border-b-2 border-primary pb-1" href="#">Home</a>
        <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors"
          href="#">About</a>
        <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors"
          href="#">Contact</a>
        <button
          class="bg-primary text-on-primary px-6 py-2 rounded-lg font-label-sm uppercase tracking-wider hover:opacity-90 active:scale-95 transition-all">
          Order Now
        </button>
      </div>
      <button class="md:hidden p-2 text-primary">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </nav>
  </header>
  {% block main %}
  {% endblock main %}
  <!-- Footer -->
  <footer class="w-full py-stack-lg bg-surface-container border-t border-on-surface/10">
    <div
      class="max-w-[1200px] mx-auto px-margin-mobile md:px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-stack-md text-center md:text-left">
      <div class="space-y-2">
        <span class="font-display-lg text-headline-md text-primary">Botanical Heritage</span>
        <p class="font-label-sm text-on-surface-variant">© 2024 Botanical Heritage Café. All rights reserved.</p>
      </div>
      <div class="flex gap-stack-md flex-wrap justify-center">
        <a class="font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Instagram</a>
        <a class="font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Facebook</a>
        <a class="font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy
          Policy</a>
        <a class="font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of
          Service</a>
      </div>
    </div>
  </footer>
  {% comment %}
  <script>
    // Simple parallax effect for hero
    window.addEventListener('scroll', () => {
      const scrolled = window.pageYOffset;
      const heroImage = document.querySelector('img[src="{{DATA:SCREEN:SCREEN_5}}"]');
      if (heroImage) {
        heroImage.style.transform = `translateY(${scrolled * 0.05}px)`;
      }
    });

    // Hover scale interaction for navigation buttons
    const primaryButtons = document.querySelectorAll('.bg-primary');
    primaryButtons.forEach(btn => {
      btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
      btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
      btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
    });
  </script> {% endcomment %}
</body>

</html>
